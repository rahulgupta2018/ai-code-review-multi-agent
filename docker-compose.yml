      - ENVIRONMENT=development
      - DEBUG=true
      # Native Ollama connectivity via host
      - OLLAMA_API_BASE=http://host.docker.internal:11434
    ports:
      - "8000:8000"     # Main API
      - "8200:8200"     # ADK Dev Portal
