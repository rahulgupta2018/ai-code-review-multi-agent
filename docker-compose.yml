services:
  adk-code-review:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adk-code-review
    restart: unless-stopped
    environment:
      - ADK_WORKSPACE=/app/adk-workspace
      - ADK_DEV_PORTAL_HOST=0.0.0.0
      - ADK_DEV_PORTAL_PORT=8200
      - ADK_LOG_LEVEL=INFO
      - ENVIRONMENT=development
      - DEBUG=true
    ports:
      - "8080:8000"
      - "8201:8200"
    volumes:
      # Source code for development
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./outputs:/app/outputs
      # ADK workspace
      - adk-workspace:/app/adk-workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  adk-workspace: