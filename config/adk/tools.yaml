# ADK Tools Configuration
# Configuration for ADK FunctionTool implementations and tool orchestration

tools:
  # Tree-sitter based code parsing tool
  tree_sitter_tool:
    name: "TreeSitterTool"
    description: "Code parsing and AST analysis using Tree-sitter"
    module: "tree_sitter_tool"
    timeout: 60.0
    agent_types:
      - "code_quality"
      - "security" 
      - "engineering_practices"
    parameters:
      max_file_size: 1048576  # 1MB
      supported_languages:
        - "python"
        - "javascript"
        - "typescript"
        - "java"
        - "go"
        - "rust"
        - "cpp"
        - "c"
    config:
      cache_enabled: true
      cache_ttl: 3600  # 1 hour
      
  # Code complexity analysis tool
  complexity_analyzer_tool:
    name: "ComplexityAnalyzerTool"
    description: "Code complexity analysis and metrics calculation"
    module: "complexity_analyzer_tool"
    timeout: 90.0
    agent_types:
      - "code_quality"
      - "engineering_practices"
    parameters:
      complexity_threshold: 10
      max_function_length: 50
      max_class_length: 300
      max_parameters: 5
      max_nesting_depth: 4
    config:
      include_cognitive_complexity: true
      include_maintainability_index: true
      
  # Static analysis and security scanning tool
  static_analyzer_tool:
    name: "StaticAnalyzerTool"
    description: "Static code analysis and security vulnerability detection"
    module: "static_analyzer_tool"
    timeout: 120.0
    agent_types:
      - "security"
      - "code_quality"
    parameters:
      vulnerability_scanning: true
      secret_detection: true
      dependency_check: true
      code_injection_detection: true
    config:
      scan_comments: true
      scan_strings: true
      check_dependencies: true
      
# Tool execution configuration
execution:
  default_timeout: 60.0
  max_parallel_tools: 5
  retry_attempts: 3
  retry_backoff: 2.0
  
# Tool discovery configuration  
discovery:
  auto_discovery: true
  tools_directory: "src/tools"
  cache_discovery: true
  discovery_timeout: 30.0
  
# Tool validation
validation:
  validate_inputs: true
  validate_outputs: true
  schema_validation: true
  type_checking: true
  
# Performance monitoring
monitoring:
  collect_metrics: true
  track_execution_time: true
  track_memory_usage: true
  alert_on_timeout: true
  
# Error handling
error_handling:
  capture_exceptions: true
  include_stack_traces: true
  retry_on_transient_errors: true
  fallback_to_mock: false  # No mocks or fallbacks